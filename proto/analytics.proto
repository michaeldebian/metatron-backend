syntax = "proto3";

package metratron.analytics.v1;

// ─── Databend SQL Query ──────────────────────────────────────────────────────

message Column {
  string name = 1;
  string data_type = 2;         // "String", "UInt64", "Float64", "DateTime", etc.
}

message QueryRequest {
  string sql = 1;
  string database = 2;          // default database context
  string warehouse = 3;         // Databend warehouse
  int32 max_rows = 4;           // limit (0 = use server default)
}

message QueryResponse {
  repeated Column columns = 1;
  repeated string rows_json = 2; // each element is a JSON array of values for one row
  int64 rows_read = 3;
  int64 bytes_read = 4;
  double timing_ms = 5;
  string error = 6;
}

// ─── Schema Discovery ────────────────────────────────────────────────────────

message ListDatabasesRequest {}

message ListDatabasesResponse {
  repeated string databases = 1;
}

message TableInfo {
  string name = 1;
  string engine = 2;
  int64 row_count = 3;
  int64 data_size_bytes = 4;
}

message ListTablesRequest {
  string database = 1;
}

message ListTablesResponse {
  repeated TableInfo tables = 1;
}

message DescribeTableRequest {
  string database = 1;
  string table = 2;
}

message DescribeTableResponse {
  repeated Column columns = 1;
}

// ─── Pre-built Analytics ─────────────────────────────────────────────────────

enum Granularity {
  GRANULARITY_UNSPECIFIED = 0;
  GRANULARITY_HOURLY = 1;
  GRANULARITY_DAILY = 2;
  GRANULARITY_WEEKLY = 3;
  GRANULARITY_MONTHLY = 4;
}

message TimePoint {
  string timestamp = 1;
  double value = 2;
  map<string, double> dimensions = 3;
}

message TimeSeriesRequest {
  string metric = 1;            // "cost", "requests", "latency", "cpu", "memory"
  Granularity granularity = 2;
  string start = 3;             // ISO 8601
  string end = 4;
  map<string, string> filters = 5; // e.g. {"provider": "aws", "cluster_id": "xxx"}
}

message TimeSeriesResponse {
  repeated TimePoint points = 1;
  double total = 2;
  double average = 3;
  double min = 4;
  double max = 5;
}

// ─── Service ─────────────────────────────────────────────────────────────────

service AnalyticsService {
  // Execute arbitrary SQL against Databend
  rpc Query(QueryRequest) returns (QueryResponse);

  // Schema discovery
  rpc ListDatabases(ListDatabasesRequest) returns (ListDatabasesResponse);
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);
  rpc DescribeTable(DescribeTableRequest) returns (DescribeTableResponse);

  // Pre-built time-series analytics
  rpc GetTimeSeries(TimeSeriesRequest) returns (TimeSeriesResponse);
}
